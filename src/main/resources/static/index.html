<!doctype html>
<html class="no-js" lang="">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sim Flights Tracker</title>
  <meta name="description" content="Sim Flights Tracker is an app that tracks aircraft that are live on the Vatsim and Ivao networks. With this app you can see flight information, number of flights on the Vatsim and Ivao network, and a lot of other flight related data. There is also a custom map that shows exactly where the aircraft are at any given time in their flight.">

  <meta property="og:title" content="Sim Flights Tracker">
  <meta property="og:type" content="Web App">
  <meta property="og:url" content="https://www.simflightstracker.com">
  <meta property="og:image" content="sft_transparent.png">
  <meta property="og:image:alt" content="">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">


  <style>
    body {
      font-family: "Roboto", sans-serif;
      background-color: #151926;
    }
    div.global-cont {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
      position: absolute;
      inset:0 0 0 0;
    }
    div.content-cont {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    div.store-badges {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    h2 {
      color: #fff;
    }
    div.store-badges img {
      margin: 0 10px;
    }
  </style>

  <meta name="theme-color" content="#151926">
</head>

<body>

  <div class="global-cont">
    <div class="content-cont">
      <img src="sft_transparent.png" width="200px" alt="Sim Flights Tracker"/>
      <h2>SIM FLIGHTS TRACKER</h2>
      <div class="store-badges">
        <a href="https://play.google.com/store/apps/details?id=za.co.simflightstracker.www" target="_blank">
          <img src="play.png" alt="Play Store" height="50" />
        </a>
        <a href="https://apps.apple.com/za/app/sim-flights-tracker/id1594401428" target="_blank">
          <img src="apple.svg" alt="App Store" height="50" />
        </a>
      </div>
    </div>
  </div>
</body>

</html>
